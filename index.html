<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Carrick | Carrick+Stone</title>
  <meta
    name="description"
    content="Carrick, the Carrick+Stone digital assistant for wines, whiskies, pairings and venue guidance."
  />

  <!-- Brand fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Site CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- ✅ Minimal safe inline styles (only for chat positioning) -->
  <style>
    .chat-wrapper {
      margin-top: 40px;
      width: 100%;
      height: 70vh;
      max-width: 900px;
    }

    .chat-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      overflow: hidden;

      /* ✅ Increase chat readability */
      transform: scale(1.25);
      transform-origin: top left;
      width: 80%;
    }

    /* ✅ Mobile optimisation */
    @media (max-width: 768px) {
      .chat-wrapper {
        height: 75vh;
      }

      .chat-frame {
        transform: scale(1.15);
        width: 87%;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell">

    <!-- Header -->
    <header class="site-header">
      <img
        src="Carrick-Stone-Logo-White.png"
        alt="Carrick+Stone logo"
        class="brand-logo"
      />
    </header>

    <!-- ✅ Hero now includes chat -->
    <main class="hero-layout">

      <section class="hero-copy">
        <p class="eyebrow">Carrick+Stone Assistant</p>
        <h1>Carrick</h1>

        <p class="lead">
          A refined digital host for Carrick+Stone — guiding guests through wines,
          whiskies, pairings and curated recommendations.
        </p>

        <!-- ✅ Clean paragraph (no box) -->
        <p class="lead" style="margin-top: 20px; opacity: 0.85;">
          Ask Carrick about a bottle, a dram, a pairing — or plan your visit to Carrick+Stone.
        </p>

        <!-- ✅ Chat now centred and embedded -->
        <div class="chat-wrapper">
          <iframe
            class="chat-frame"
            src="https://copilotstudio.microsoft.com/environments/Default-9be50a5f-dad9-475a-89ef-8ae005ee3a8b/bots/cr3ff_Carrick/webchat?__version__=2"
            title="Carrick chat"
          ></iframe>
        </div>

      </section>

      <!-- ✅ Avatar stays as visual anchor -->
      <aside class="hero-visual">
        <div class="avatar-frame">
          <img
            src="Carrick-Avatar.png"
            alt="Carrick avatar"
            class="avatar-image"
          />
        </div>
      </aside>

    </main>

  </div>

</body>
</html>
